name: CI Quality Gates

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  web-mobile-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install workspace dependencies
        run: npm ci

      - name: Frontend lint
        run: npm run lint --workspace frontend

      - name: Frontend tests
        run: npm run test --workspace frontend

      - name: Frontend production build
        run: npm run build --workspace frontend

      - name: Shared API contract tests
        run: npx vitest run packages/family-api/src/*.test.ts --environment node

      - name: Mobile typecheck
        run: npm run mobile:typecheck

      - name: Mobile tests
        run: npm run mobile:test

      - name: JavaScript runtime dependency audit
        run: npm audit --omit=dev --audit-level=high

  backend-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install backend and audit tooling
        run: |
          python -m pip install --upgrade pip
          pip install -e "backend[dev]"
          pip install pip-audit

      - name: Full backend test suite
        run: pytest backend/tests -q

      - name: Explicit fresh migration gate
        run: pytest backend/tests/test_alembic_migrations.py::test_alembic_upgrade_head_creates_family_manager_schema -q

      - name: Python dependency audit
        run: pip-audit --strict backend
